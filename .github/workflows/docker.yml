name: Build & Push Docker Image

# Triggered by semver tags: v0.1.0, v1.2.3, etc.
# Pushes to ghcr.io/<owner>/<repo>:<tag> + :latest

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read
  packages: write   # publish to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # full semver:  v0.1.0  → 0.1.0
            type=semver,pattern={{version}}
            # minor stream: v0.1.0  → 0.1
            type=semver,pattern={{major}}.{{minor}}
            # short sha for traceability
            type=sha,prefix=sha-,format=short
            # latest on every tag push (only stable releases should be tagged v*)
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
