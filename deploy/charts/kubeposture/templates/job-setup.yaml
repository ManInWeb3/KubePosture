apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubeposture.fullname" . }}-setup-{{ .Release.Revision }}
  labels:
    {{- include "kubeposture.labels" . | nindent 4 }}
    app.kubernetes.io/component: setup
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "kubeposture.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubeposture.serviceAccountName" . }}
      securityContext:
        {{- include "kubeposture.podSecurityContext" . | nindent 8 }}
      restartPolicy: OnFailure
      initContainers:
        {{- include "kubeposture.waitForDb" . | nindent 8 }}
      containers:
        - name: setup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "==> Running setup_roles..."
              python manage.py setup_roles
              echo "==> Loading compliance frameworks..."
              {{- range .Values.frameworkFixtures }}
              python manage.py load_frameworks fixtures/{{ . }}
              {{- end }}
              echo "==> Ensuring admin user..."
              python manage.py ensure_adminuser \
                --username {{ .Values.adminUser.username | quote }} \
                --password {{ .Values.adminUser.password | quote }} \
                --email {{ .Values.adminUser.email | quote }}
              echo "==> Setup complete."
          env:
            {{- include "kubeposture.env" . | nindent 12 }}
          securityContext:
            {{- include "kubeposture.securityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.setupJob.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
