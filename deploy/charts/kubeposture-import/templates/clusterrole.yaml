apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeposture-import.fullname" . }}
  labels:
    {{- include "kubeposture-import.labels" . | nindent 4 }}
rules:
  # Cluster-metadata auto-detect — feeds /api/v1/cluster-metadata/sync/.
  # Without these the script can't discover K8s version, provider/region,
  # or per-namespace internet exposure (Services LB/NodePort + Ingresses),
  # and complete_snapshot stays False (deactivation sweep is skipped).
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - services
      # Pod status carries resolved container digests (imageID), which we
      # need to populate Image.digest precisely instead of inferring from
      # the spec tag.
      - pods
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list"]
  # Workload controllers — per-workload exposure + security context drive
  # the priority tree (directly_exposed, host_network, privileged, RBAC).
  # ReplicaSets + Jobs are also listed: we read their ownerReferences to
  # map what Trivy actually scans (the child) back to the parent
  # Deployment / CronJob. That normalization preserves Finding identity
  # across rollouts (same CVE, same controller → same hash).
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list"]
  {{- if .Values.import.trivy }}
  # Trivy Operator CRDs (7 types)
  - apiGroups: ["aquasecurity.github.io"]
    resources:
      - vulnerabilityreports
      - configauditreports
      - exposedsecretreports
      - rbacassessmentreports
      - infraassessmentreports
      - clustercompliancereports
      - sbomreports
    verbs: ["get", "list"]
  {{- end }}
  {{- if .Values.import.kyverno }}
  # Kyverno PolicyReport CRDs (2 types)
  - apiGroups: ["wgpolicyk8s.io"]
    resources:
      - policyreports
      - clusterpolicyreports
    verbs: ["get", "list"]
  {{- end }}
