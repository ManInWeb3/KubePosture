services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kubeposture
      POSTGRES_USER: kubeposture
      POSTGRES_PASSWORD: kubeposture
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubeposture"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
